name: Daily AI Publisher Cron

on:
  schedule:
    # Runs at minute 0 of every hour
    - cron: '0 * * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ping_server:
    runs-on: ubuntu-latest
    steps:
      - name: Call Next.js Cron Endpoint
        run: |
          curl -X GET "https://taxexpertshub.com/api/cron/auto-publish" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
